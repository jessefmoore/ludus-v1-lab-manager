name: ludus-v1-mgr

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ludus-v1-mgr-backend
    container_name: ludus-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Force production so the lifespan handler applies alembic migrations
      # rather than the dev-only Base.metadata.create_all fallback.
      APP_ENV: production
      DATABASE_URL: postgresql://insec:${POSTGRES_PASSWORD:-insec-dev-password}@postgres:5432/insec
      CONFIG_STORAGE_DIR: /app/data/configs
    volumes:
      # WireGuard configs + any local storage.
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ludus-v1-mgr
    healthcheck:
      # curl is not in the slim image; python is, so use urllib.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ludus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: insec
      POSTGRES_USER: insec
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insec-dev-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ludus-v1-mgr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insec"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ludus-v1-mgr-frontend
    container_name: ludus-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - backend
    networks:
      - ludus-v1-mgr

volumes:
  pgdata:

networks:
  ludus-v1-mgr:
    driver: bridge
